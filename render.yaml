# Render Blueprint — deploy Express API (server-new.js)
# Dashboard: New → Blueprint → connect repo, or Web Service with these settings manually.

services:
  - type: web
    name: make-big-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run api:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: GROQ_API_KEY
        sync: false

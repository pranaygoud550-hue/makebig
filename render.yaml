# Render Blueprint — API only (split deploy with Vercel frontend)
# Frontend: Vercel (Next.js)  →  NEXT_PUBLIC_API_URL = this service URL
# Backend:  Render (Express)   →  server-new.js on process.env.PORT

services:
  - type: web
    name: make-big-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run api:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_DATA_BACKEND
        value: mongo
      - key: FRONTEND_URL
        value: https://makebig.vercel.app
      - key: CORS_EXTRA_ORIGINS
        value: https://makebig.vercel.app
      - key: CORS_ALLOW_VERCEL_PREVIEWS
        value: "true"
      - key: ALLOW_DEV_OTP
        value: "false"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: FAST2SMS_API_KEY
        sync: false
